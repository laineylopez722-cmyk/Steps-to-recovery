name: Release

on:
  push:
    tags: ['v*']

jobs:
  build_android:
    name: Build Android Production
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS Production
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit to Play Store (Internal)
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit to App Store (TestFlight)
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production
