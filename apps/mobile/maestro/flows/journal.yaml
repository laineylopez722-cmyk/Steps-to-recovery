# Journal Entry Flow E2E Test
# Tests creating and viewing journal entries
# Note: Requires authenticated user state

appId: com.stepstorecovery.app
---
# Launch app (assumes user is already logged in)
- launchApp

# Wait for dashboard
- extendedWaitUntil:
    visible:
      anyOf:
        - 'Home'
        - 'Dashboard'
        - 'Clean Time'
    timeout: 10000

# Navigate to Journal tab
- tapOn:
    text: 'Journal'

# Wait for journal screen
- extendedWaitUntil:
    visible:
      anyOf:
        - 'Journal'
        - 'Entries'
        - 'My Journal'
    timeout: 5000

# Tap new entry button (FAB)
- tapOn:
    accessibilityLabel: 'New Entry'

# Wait for journal editor
- extendedWaitUntil:
    visible:
      anyOf:
        - 'New Entry'
        - 'Write your thoughts'
        - 'Journal Entry'
    timeout: 5000

# Enter journal title
- inputText:
    id: 'title-input'
    text: 'E2E Test Entry'
    optional: true

# Enter journal content
- tapOn:
    id: 'content-input'
    optional: true

- inputText:
    text: 'This is an automated test entry created by Maestro E2E tests. The app is working correctly!'

# Set mood (if mood picker exists)
- tapOn:
    text:
      anyOf:
        - 'Mood'
        - 'How are you feeling?'
    optional: true

- tapOn:
    text: 'Good'
    optional: true

# Save the entry
- tapOn:
    text:
      anyOf:
        - 'Save'
        - 'Done'
        - 'Submit'

# Wait for save to complete
- extendedWaitUntil:
    visible:
      anyOf:
        - 'Journal'
        - 'E2E Test Entry'
        - 'Entry saved'
    timeout: 10000

# Verify entry appears in list
- assertVisible:
    anyOf:
      - 'E2E Test Entry'
      - 'automated test entry'

# Success!
- runScript:
    script: |
      console.log('✅ Journal entry flow completed successfully')
