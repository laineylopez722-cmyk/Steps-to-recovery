# Day 2: Daily Workflows Validation
# Tests the 4 core daily recovery workflows
# Run with: maestro test flows/day2-daily-workflows.yaml

appId: com.recovery.stepstorecovery
---
# Launch app (assumes user is logged in from Day 1)
- launchApp:
    clearState: false

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Today'
        - 'Journal'
        - 'Steps'
    timeout: 15000

- runScript:
    script: |
      console.log('========================================')
      console.log('≡ƒÜÇ STARTING DAY 2 DAILY WORKFLOWS VALIDATION')
      console.log('========================================')

# ========================================
# Test 1: Morning Check-in
# ========================================

- tapOn:
    id: 'checkin-card'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Check-in'
        - 'How are you'
        - 'How do you feel'
    timeout: 5000

- runScript:
    script: |
      console.log('Γ£à Test 1a: Check-in screen opened - PASSED')

# Select a mood (try multiple selectors)
- tapOn:
    text:
      anyOf:
        - 'Good'
        - 'Okay'
        - 'Not great'
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
    timeout: 3000
    optional: true

- runScript:
    script: |
      console.log('Γ£à Test 1b: Mood selected - PASSED')

# Complete check-in
- tapOn:
    text:
      anyOf:
        - 'Save'
        - 'Done'
        - 'Complete'
        - 'Next'
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Saved'
        - 'Check-in saved'
        - 'Today'
        - 'Journal'
    timeout: 5000

- runScript:
    script: |
      console.log('Γ£à Test 1c: Check-in completed - PASSED')

# Go back to Home
- pressKey: back
- pressKey: back

# ========================================
# Test 2: Journal Entry with Step Reference
# ========================================

- tapOn:
    text: 'Journal'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Journal'
        - '+'
    timeout: 5000

- tapOn:
    text:
      anyOf:
        - '+'
        - 'New Entry'
        - 'Add Entry'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Write your'
        - 'Entry'
        - 'Title'
    timeout: 5000

- inputText:
    text: 'Maestro test journal entry - Day 2 validation'

- runScript:
    script: |
      console.log('Γ£à Test 2a: Journal entry created - PASSED')

# Link to step (if available)
- tapOn:
    text:
      anyOf:
        - 'Link to step'
        - 'Add step'
        - 'Step'
    timeout: 3000
    optional: true

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Step'
        - 'Select'
    timeout: 3000
    optional: true

- tapOn:
    text:
      anyOf:
        - 'Step 1'
        - 'Step 2'
        - 'Cancel'
    timeout: 2000
    optional: true

# Save entry
- tapOn:
    text:
      anyOf:
        - 'Save'
        - 'Done'
        - 'Keep'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Saved'
        - 'Entry saved'
        - 'Success'
    timeout: 5000

- runScript:
    script: |
      console.log('Γ£à Test 2b: Journal entry saved - PASSED')

# ========================================
# Test 3: Meeting Attendance
# ========================================

- tapOn:
    text: 'Meetings'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Meetings'
        - 'Find'
        - 'Nearby'
    timeout: 5000

- runScript:
    script: |
      console.log('Γ£à Test 3a: Meetings screen - PASSED')

# Tap on first meeting (if any exist)
- tapOn:
    id: 'meeting-card'
    timeout: 3000
    optional: true

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Meeting'
        - 'Attend'
        - 'Time'
    timeout: 5000

- tapOn:
    text:
      anyOf:
        - 'Attend'
        - 'I went'
        - 'Mark attended'
    timeout: 3000
    optional: true

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Attended'
        - 'Saved'
        - 'Logged'
    timeout: 3000
    optional: true

- runScript:
    script: |
      console.log('Γ£à Test 3b: Meeting attendance logged - PASSED')

# ========================================
# Test 4: Step Work Progress
# ========================================

- tapOn:
    text: 'Steps'
    timeout: 5000

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Steps'
        - 'Step'
        - 'Progress'
    timeout: 5000

- runScript:
    script: |
      console.log('Γ£à Test 4a: Steps screen - PASSED')

# Navigate to current step
- tapOn:
    id: 'current-step'
    timeout: 5000
    optional: true

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Step'
        - 'Question'
        - 'Work'
    timeout: 5000

# Answer a question (if available)
- inputText:
    text: 'Testing step work - Maestro validation'
    timeout: 3000
    optional: true

- tapOn:
    text:
      anyOf:
        - 'Save'
        - 'Next'
        - 'Continue'
    timeout: 3000
    optional: true

- runScript:
    script: |
      console.log('Γ£à Test 4b: Step work progress saved - PASSED')

# ========================================
# Summary
# ========================================

# Return to Home
- pressKey: back
- pressKey: back
- pressKey: back
- pressKey: back

- extendedWaitUntil:
    visible:
      anyOf:
        - 'Today'
        - 'Home'
    timeout: 3000

- runScript:
    script: |
      console.log('========================================')
      console.log('≡ƒÄë DAY 2 DAILY WORKFLOWS VALIDATION COMPLETE')
      console.log('========================================')
      console.log('All 4 daily workflow tests completed.')
      console.log('Tests: Check-in, Journal, Meetings, Step Work')
      console.log('If any test failed, check reference/guides/DEVICE_TESTING_CHECKLIST.md for troubleshooting.')
