name: E2E Tests (Maestro)

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.maestro/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      flow:
        description: 'Specific flow to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - onboarding
          - login
          - daily-checkin
          - journal
          - step-work
          - offline-sync

env:
  MAESTRO_VERSION: 1.39.0

permissions:
  contents: read

jobs:
  # ============================================================
  # Build Development App for Testing
  # ============================================================
  build-android:
    name: Build Android (Debug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Android Debug APK
        run: |
          cd apps/mobile
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ============================================================
  # Run E2E Tests with Maestro Cloud
  # ============================================================
  e2e-cloud:
    name: E2E Tests (Maestro Cloud)
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: ./apk

      - name: Run Maestro Cloud
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          project-id: ${{ secrets.MAESTRO_CLOUD_PROJECT_ID }}
          app-file: ./apk/app-debug.apk
          workspace: apps/mobile/.maestro
          flow: ${{ github.event.inputs.flow || '' }}
          name: Steps-to-Recovery-E2E-${{ github.run_number }}

  # ============================================================
  # Run E2E Tests Locally (Self-hosted runner)
  # ============================================================
  e2e-local:
    name: E2E Tests (Local Emulator)
    runs-on: ubuntu-latest
    needs: build-android
    # Only run on workflow_dispatch or pushes to main
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro Installation
        run: maestro --version

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: ./apk

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            # Install the APK
            adb install -r ./apk/app-debug.apk

      - name: Run E2E Tests
        env:
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: |
          cd apps/mobile
          if [ -n "${{ github.event.inputs.flow }}" ]; then
            maestro test .maestro/flows/${{ github.event.inputs.flow }}.yaml
          else
            maestro test .maestro/flows/onboarding.yaml
            maestro test .maestro/flows/login.yaml
            maestro test .maestro/flows/daily-checkin.yaml
            maestro test .maestro/flows/journal.yaml
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: ~/.maestro/tests/
          retention-days: 7

  # ============================================================
  # Validate Maestro Flows (Syntax Check)
  # ============================================================
  validate-flows:
    name: Validate Maestro Flows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Validate Flow Syntax
        run: |
          cd apps/mobile
          for flow in .maestro/flows/*.yaml; do
            echo "Validating $flow..."
            maestro test --dry-run "$flow" || exit 1
          done

      - name: Check Test IDs Documentation
        run: |
          echo "Checking for testID usage in codebase..."
          TESTID_COUNT=$(grep -r "testID=" apps/mobile/src --include="*.tsx" | wc -l)
          echo "Found $TESTID_COUNT testID attributes"
          if [ "$TESTID_COUNT" -lt 10 ]; then
            echo "⚠️ Warning: Low number of testIDs found. Consider adding more for better E2E test coverage."
          fi
