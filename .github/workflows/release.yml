name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build and submit'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      track:
        description: 'Android release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - production

env:
  EXPO_NO_TELEMETRY: 1
  # Pinned to latest stable EAS CLI. Must stay in sync with:
  #   - apps/mobile/eas.json  cli.version
  #   - .github/workflows/eas-build.yml  EAS_CLI_VERSION
  EAS_CLI_VERSION: 16.28.0

permissions:
  contents: write

jobs:
  # ============================================================
  # Critical Issues Gate — blocks release if open critical issues exist
  # ============================================================
  critical-issues-gate:
    name: Critical Issues Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for open critical issues
        id: check_critical
        run: |
          # Find all *.issue.md files with severity: critical AND status: open
          # Uses *.issue.md glob to exclude README, TEMPLATE, and other meta files.
          # Handles both quoted YAML ("critical") and unquoted (critical) values.
          CRITICAL_OPEN=$(find .claude/issues -name "*.issue.md" -type f 2>/dev/null | \
            xargs grep -lE 'severity: "?critical"?' 2>/dev/null | \
            xargs grep -lE 'status: "?open"?' 2>/dev/null || true)

          if [ -n "$CRITICAL_OPEN" ]; then
            echo ""
            echo "ERROR: Release blocked by open critical issues."
            echo ""
            echo "The following critical issues must be resolved before releasing:"
            echo ""
            for f in $CRITICAL_OPEN; do
              ISSUE_ID=$(grep "^id:" "$f" | head -1 | sed 's/^id: *"*//; s/"*$//')
              ISSUE_TITLE=$(grep "^title:" "$f" | head -1 | sed 's/^title: *"*//; s/"*$//')
              echo "  - ${ISSUE_ID}: ${ISSUE_TITLE}"
              echo "    File: ${f}"
            done
            echo ""
            echo "To override (emergency only): set the SKIP_CRITICAL_ISSUES_GATE secret to 'true'"
            echo "and document the reason in the release PR."
            exit 1
          else
            echo "Critical issues gate passed — no open critical issues found."
          fi
        env:
          SKIP_CRITICAL_ISSUES_GATE: ${{ secrets.SKIP_CRITICAL_ISSUES_GATE }}

      - name: Override gate check
        if: env.SKIP_CRITICAL_ISSUES_GATE == 'true'
        run: |
          echo "WARNING: Critical issues gate bypassed via SKIP_CRITICAL_ISSUES_GATE secret."
          echo "This override should only be used for emergency hotfixes."
          echo "Document the reason in the release PR and create a follow-up issue."
        env:
          SKIP_CRITICAL_ISSUES_GATE: ${{ secrets.SKIP_CRITICAL_ISSUES_GATE }}

  # ============================================================
  # Quality Gates — must pass before any build
  # ============================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: critical-issues-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run async-act guardrail audit
        run: npm run audit:test-act --workspace=apps/mobile

      - name: Doctor toolchain
        run: npm run doctor:toolchain

      - name: Doctor aliases
        run: npm run doctor:aliases

      - name: Run ESLint
        run: npx turbo run lint --force

      - name: TypeScript type check
        run: npx turbo run type-check --force

      - name: Run tests
        run: npm run test --workspace=apps/mobile -- --runInBand --no-cache

      - name: Run encryption tests
        run: |
          cd apps/mobile
          npm run test:encryption

  # ============================================================
  # Build & Submit — Android
  # ============================================================
  build-android:
    name: Build & Submit Android
    runs-on: ubuntu-latest
    needs: quality-gates
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android (Production AAB)
        run: |
          cd apps/mobile
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Submit to Play Store
        run: |
          cd apps/mobile
          eas submit \
            --platform android \
            --profile production \
            --latest \
            --non-interactive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_PATH }}

  # ============================================================
  # Build & Submit — iOS
  # ============================================================
  build-ios:
    name: Build & Submit iOS
    runs-on: ubuntu-latest
    needs: quality-gates
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS (Production)
        run: |
          cd apps/mobile
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Submit to TestFlight
        run: |
          cd apps/mobile
          eas submit \
            --platform ios \
            --profile production \
            --latest \
            --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}

  # ============================================================
  # Create GitHub Release
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$TAG" >> release_notes.md
          else
            echo "## Initial Release" > release_notes.md
            echo "" >> release_notes.md
            echo "First production release of Steps to Recovery." >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "### Build Status" >> release_notes.md
          echo "- Android: ${{ needs.build-android.result }}" >> release_notes.md
          echo "- iOS: ${{ needs.build-ios.result }}" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # ============================================================
  # Notify
  # ============================================================
  notify:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [critical-issues-gate, quality-gates, build-android, build-ios, create-release]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## Release Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Issues Gate | ${{ needs.critical-issues-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gates | ${{ needs.quality-gates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Build & Submit | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS Build & Submit | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check [Expo Dashboard](https://expo.dev/accounts/ripkdrs-organization/projects/steps-to-recovery/builds) for build details." >> $GITHUB_STEP_SUMMARY
